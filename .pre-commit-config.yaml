repos:
  - repo: local
    hooks:
      - id: clang-format
        name: clang-format
        entry: clang-format -i
        language: system
        files: \.(h|hpp|cuh|cu|cpp|cc)$
      - id: spec-rules-lint
        name: spec-rules-lint
        entry: python scripts/spec_rules_lint.py
        language: system
        files: ^docs/spec/.*\.md$
      - id: spec-entropy-lint
        name: spec-entropy-lint
        entry: python scripts/spec_entropy_lint.py
        language: system
        files: ^src/.*\.py$
